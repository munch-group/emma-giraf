project:
  type: book
  post-render: 
    # - quarto render --profile slides
    - quarto render slides/
    - quarto render thesis/
    
execute:
  freeze: auto
  echo: true
      
format:
  html:
    theme: 
      - default
      - custom.scss
    toc-depth: 2
    notebook-links: true
    number-sections: false  
    reference-location: margin
    mermaid:
      theme: neutral

comments:
  hypothesis: true

lightbox: true

book:
  repo-url: "https://github.com/munch-group/emma-giraf"
  repo-actions: [edit, issue, source]  
  title: "Emmas project"
  author: "Emma Christensen"  
  sidebar:
    collapse-level: 1
    search: true  
  chapters:
    - index.qmd
    - part: "Thesis"
      chapters:
      # (the same files must be listed _quarto-slides.yml to render as slides)
      - thesis/index.qmd 
    - part: "Slides"
      chapters:
      # (the same files must be listed _quarto-slides.yml to render as slides)
      - slides/index.qmd 
    - part: "Notebooks"
      chapters: 
      - notebooks/01_markov_coalescent_basics.ipynb
      - notebooks/02_inference.ipynb
      - notebooks/03_baboon_data.ipynb
      - notebooks/04_two_island_model.ipynb
      - notebooks/05_IM_model.ipynb
      - notebooks/06_time_inhomogeneous_models.ipynb
      - notebooks/07_baboon_results.ipynb
    - part: "Workflows"
      chapters: 
      - workflow.py
    # - part: "Reports"
    #   chapters: 
    #   - reports/example.qmd
    # - part: "Tables"
    #   chapters: 
    #   - tables/example.ipynb
  downloads: [pdf]
     
bibliography: references.bib

